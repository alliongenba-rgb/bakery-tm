<style>
:root {
  --cream: #fdf8f2;
  --dark: #1a1a1a;
  --pink: #e8457a;
  --orange: #f5832a;
  --grad: linear-gradient(135deg, #f5832a, #e8457a, #c44aaa);
  --green: #2d6e4a;
  --light-green: #e8f4ed;
  --border: #eed8c0;
  --card: #ffffff;
  --text-sub: #9a8068;
  --brown: #7a5230;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--cream);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--dark);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* Header */
.header {
  background: #fff;
  border-bottom: 3px solid transparent;
  border-image: var(--grad) 1;
  padding: 14px 16px 0;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,0.1);
}
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.header-logo {
  width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
  border: 2px solid transparent;
  background: linear-gradient(white, white) padding-box, var(--grad) border-box;
  flex-shrink: 0;
}
.header-title {
  font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 700;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
.badge-stock {
  margin-left: auto; flex-shrink: 0;
  background: var(--grad); color: #fff;
  border-radius: 10px; padding: 6px 12px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}

/* Tabs */
.tabs { display: flex; gap: 2px; }
.tab-btn {
  flex: 1; padding: 10px 2px; border: none; cursor: pointer; font-size: 11px;
  font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700;
  border-radius: 8px 8px 0 0; background: transparent; color: var(--text-sub);
  transition: all 0.2s;
}
.tab-btn.active {
  background: var(--cream); color: var(--dark);
  border-top: 2px solid var(--pink);
}

/* Content */
.content { max-width: 480px; margin: 0 auto; padding: 20px 14px; }

.section-label {
  font-size: 11px; font-weight: 700; color: var(--text-sub);
  letter-spacing: 2px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Bread grid */
.bread-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.bread-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 16px; padding: 14px; cursor: pointer;
  transition: all 0.2s; user-select: none;
}
.bread-card.selected {
  background: linear-gradient(135deg, #f5832a, #e8457a);
  border-color: transparent; color: #fff;
  transform: scale(1.02); box-shadow: 0 8px 24px rgba(232,69,122,0.35);
}
.bread-emoji { font-size: 28px; margin-bottom: 8px; display: block; }
.bread-name { font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
.bread-card.selected .bread-name,
.bread-card.selected .bread-stock { color: #fff; }
.bread-stock { font-size: 11px; color: var(--text-sub); }
.bread-price { font-size: 14px; font-weight: 700; color: var(--green); }
.bread-card.selected .bread-price { color: #fff5cc; }
.discount-row { display: flex; gap: 4px; margin-top: 8px; }
.disc-btn {
  flex: 1; padding: 5px 0; border-radius: 8px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 700; transition: all 0.15s;
  background: rgba(255,255,255,0.2); color: #fff;
}
.disc-btn.active { background: #fff; color: var(--pink); }

/* Members */
.member-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; background: var(--card);
  border: 1.5px solid var(--border); border-radius: 14px;
  cursor: pointer; margin-bottom: 8px; transition: all 0.2s;
  user-select: none;
}
.member-row.selected { border-color: var(--pink); background: #fff0f5; }
.member-avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; font-family: 'Noto Serif JP', serif;
  background: var(--border); color: var(--dark); transition: all 0.2s;
}
.member-row.selected .member-avatar { background: var(--grad); color: #fff; }
.member-name { font-weight: 700; font-size: 14px; }
.member-line { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
.member-check {
  margin-left: auto; width: 24px; height: 24px; border-radius: 7px;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s; flex-shrink: 0;
}
.member-row.selected .member-check { background: var(--pink); border-color: var(--pink); color: #fff; }

.btn-all {
  width: 100%; padding: 10px; background: none; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 13px; color: var(--brown); cursor: pointer;
  font-family: 'Zen Kaku Gothic New', sans-serif; margin-bottom: 12px; font-weight: 700;
}

/* Preview */
.preview-box { background: #e8f5e9; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.preview-label { font-size: 11px; color: #5a8a6a; margin-bottom: 10px; text-align: center; font-weight: 700; }
.line-bubble {
  background: #fff; border-radius: 18px 18px 18px 4px;
  padding: 14px 16px; max-width: 290px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  font-size: 13px; line-height: 1.8; color: #1a1a1a;
  white-space: pre-wrap; word-break: break-word;
}
.preview-meta { font-size: 10px; color: #8aaa8a; margin-top: 8px; }

/* QR */
.qr-section {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 20px; margin-bottom: 16px; text-align: center;
}
.qr-title { font-family: 'Noto Serif JP', serif; font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.qr-sub { font-size: 11px; color: var(--text-sub); margin-bottom: 16px; }
#qrcode { display: inline-block; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
#qrcode canvas, #qrcode img { border-radius: 8px; display: block; }
.qr-hint { font-size: 11px; color: var(--text-sub); margin-top: 12px; }
.btn-qr {
  margin-top: 12px; padding: 10px 24px;
  background: var(--grad); color: #fff;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif;
}

/* Send */
.btn-send {
  width: 100%; padding: 18px;
  background: var(--grad); color: #fff;
  border: none; border-radius: 16px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Serif JP', serif;
  box-shadow: 0 6px 20px rgba(232,69,122,0.4); transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-appearance: none; appearance: none;
}
.btn-send:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
.btn-send:not(:disabled):active { transform: scale(0.97); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 13px 14px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--dark); outline: none; transition: border-color 0.2s; -webkit-appearance: none;
}
.form-input:focus { border-color: var(--pink); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* History */
.hist-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.hist-date { font-size: 13px; font-weight: 700; }
.hist-badge { background: var(--green); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.hist-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.hist-tag { background: var(--cream); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--brown); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff; padding: 13px 24px; border-radius: 12px;
  font-size: 14px; font-weight: 700; box-shadow: 0 8px 28px rgba(0,0,0,0.25);
  z-index: 999; white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

.empty { text-align: center; padding: 60px 20px; color: var(--text-sub); }
.empty-icon { font-size: 52px; margin-bottom: 16px; }

@keyframes float3d {
  0%,100% { transform: perspective(400px) rotateY(-5deg) rotateX(3deg) translateY(0px); }
  50% { transform: perspective(400px) rotateY(5deg) rotateX(-3deg) translateY(-6px); }
}

<script>
let breads = [
  { id:1, name:"クロワッサン",   emoji:"🥐", stock:8, price:220 },
  { id:2, name:"食パン（1斤）",   emoji:"🍞", stock:3, price:380 },
  { id:3, name:"メロンパン",     emoji:"🍈", stock:5, price:180 },
  { id:4, name:"あんぱん",       emoji:"🫓", stock:6, price:160 },
  { id:5, name:"バゲット",       emoji:"🥖", stock:4, price:280 },
  { id:6, name:"チョココルネ",   emoji:"🌀", stock:7, price:160 },
];
let members = [
  { id:1, name:"田中 花子",  line:"@hanako_t",   avatar:"花", purchases:24 },
  { id:2, name:"山田 太郎",  line:"@taro_y",     avatar:"山", purchases:38 },
  { id:3, name:"佐藤 美咲",  line:"@misaki_s",   avatar:"美", purchases:52 },
  { id:4, name:"鈴木 健一",  line:"@ken_suzuki", avatar:"鈴", purchases:12 },
  { id:5, name:"伊藤 さくら",line:"@sakura_ito", avatar:"伊", purchases:71 },
];
let selectedBreads = {};
let selectedMembers = {};
let history = [];
let nextMemberId = 10;
let nextBreadId = 10;

window.onload = () => {
  renderBreadGrid(); renderMemberList(); renderBreadEditList(); renderMemberFullList(); renderHistory(); updateStock();
};

function updateStock() {
  document.getElementById('stockBadge').textContent = '本日 ' + breads.reduce((a,b)=>a+b.stock,0) + '個 残り';
}

function switchTab(name) {
  ['compose','bakery','members','history'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['compose','bakery','members','history'][i]===name);
  });
}

function renderBreadGrid() {
  document.getElementById('breadGrid').innerHTML = breads.map(b => {
    const sel = selectedBreads[b.id] !== undefined;
    const disc = selectedBreads[b.id] || 20;
    const price = Math.floor(b.price * (1 - disc/100));
    return '<div class="bread-card'+(sel?' selected':'')+'" onclick="toggleBread('+b.id+')">'+
      '<span class="bread-emoji">'+b.emoji+'</span>'+
      '<div class="bread-name">'+b.name+'</div>'+
      '<div class="bread-stock">残り '+b.stock+'個</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">'+
        '<span class="bread-price">¥'+price+'</span>'+
        (sel?'<span style="font-size:18px;">✓</span>':'')+
      '</div>'+
      (sel?'<div class="discount-row" onclick="event.stopPropagation()">'+
        [20,30,40,50].map(r=>'<button class="disc-btn'+(disc===r?' active':'')+'" onclick="setDiscount('+b.id+','+r+')">'+r+'%</button>').join('')+
      '</div>':'')+
    '</div>';
  }).join('');
}

function toggleBread(id) {
  if (selectedBreads[id]!==undefined) delete selectedBreads[id]; else selectedBreads[id]=20;
  renderBreadGrid(); updateSteps();
}
function setDiscount(id,rate) { selectedBreads[id]=rate; renderBreadGrid(); updateSteps(); }

function renderMemberList() {
  const list = document.getElementById('memberList');
  if (!list) return;
  list.innerHTML = members.map(m =>
    '<div class="member-row'+(selectedMembers[m.id]?' selected':'')+'" onclick="toggleMember('+m.id+')">'+
    '<div class="member-avatar">'+m.avatar+'</div>'+
    '<div><div class="member-name">'+m.name+'</div><div class="member-line">'+m.line+' · '+m.purchases+'回購入</div></div>'+
    '<div class="member-check">'+(selectedMembers[m.id]?'✓':'')+'</div></div>'
  ).join('');
}

function toggleMember(id) { selectedMembers[id]=!selectedMembers[id]; renderMemberList(); updateSteps(); }
function selectAllMembers() { members.forEach(m=>selectedMembers[m.id]=true); renderMemberList(); updateSteps(); }

function updateSteps() {
  const selB = Object.keys(selectedBreads).filter(k=>selectedBreads[k]!==undefined);
  const selM = Object.keys(selectedMembers).filter(k=>selectedMembers[k]);
  document.getElementById('step2').style.display = selB.length>0?'block':'none';
  document.getElementById('step3').style.display = (selB.length>0&&selM.length>0)?'block':'none';
  const btn = document.getElementById('sendBtn');
  if (selB.length>0&&selM.length>0) {
    btn.disabled=false; btn.querySelector('span').textContent='📨 '+selM.length+'人にDM送信';
    updatePreview(); updateQR();
  } else {
    btn.disabled=true;
    btn.querySelector('span').textContent = selB.length>0?'会員を選択してください':'パンを選択してください';
  }
}

function updatePreview() {
  const now = new Date();
  const timeStr = now.getHours()+':'+(String(now.getMinutes()).padStart(2,'0'));
  const dateStr = (now.getMonth()+1)+'月'+now.getDate()+'日';
  const shopName = document.getElementById('shopName')?.value||'T&Mベーカリーハウス';
  const closeTime = document.getElementById('closeTime')?.value||'18:00';
  const lines = Object.keys(selectedBreads).map(id=>{
    const b=breads.find(x=>x.id==id); if(!b) return '';
    const disc=selectedBreads[id]||20;
    return b.emoji+' '+b.name+'  ¥'+Math.floor(b.price*(1-disc/100))+'（'+disc+'%OFF）残り'+b.stock+'個';
  }).filter(Boolean).join('\n');
  const msg='🍞 本日の残りパンご案内 🍞\n'+dateStr+' '+timeStr+' 現在\n\nいつもご来店ありがとうございます！\n本日閉店までに残っているパンのご案内です。\n\n'+lines+'\n\n📍 '+shopName+'\n⏰ 閉店：'+closeTime+'まで\n\n※売り切れの場合はご了承ください🙏';
  document.getElementById('linePreview').textContent=msg;
  const selM=Object.keys(selectedMembers).filter(k=>selectedMembers[k]).length;
  document.getElementById('previewMeta').textContent=timeStr+' · '+selM+'人に送信予定';
}

function updateQR() {
  const selBreads = Object.keys(selectedBreads).map(id=>{
    const b=breads.find(x=>x.id==id);
    const disc=selectedBreads[id]||20;
    return encodeURIComponent(b.name)+':'+Math.floor(b.price*(1-disc/100))+':'+b.stock;
  }).join(',');
  const shopName=encodeURIComponent(document.getElementById('shopName')?.value||'T&Mベーカリーハウス');
  const closeTime=encodeURIComponent(document.getElementById('closeTime')?.value||'18:00');
  const url=window.location.href.split('?')[0]+'?shop='+shopName+'&close='+closeTime+'&breads='+selBreads+'&t='+Date.now();
  document.getElementById('qrcode').innerHTML='';
  try {
    new QRCode(document.getElementById('qrcode'),{text:url,width:180,height:180,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  } catch(e) {}
}

function downloadQR() {
  const canvas=document.querySelector('#qrcode canvas');
  if(!canvas){showToast('先にパンを選択してください',false);return;}
  const p=20,oc=document.createElement('canvas');
  oc.width=canvas.width+p*2; oc.height=canvas.height+p*2;
  const ctx=oc.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,oc.width,oc.height);
  const grd=ctx.createLinearGradient(0,0,oc.width,oc.height);
  grd.addColorStop(0,'#f5832a'); grd.addColorStop(0.5,'#e8457a'); grd.addColorStop(1,'#c44aaa');
  ctx.strokeStyle=grd; ctx.lineWidth=4;
  ctx.beginPath(); ctx.roundRect(p-6,p-6,canvas.width+12,canvas.height+12,14); ctx.stroke();
  ctx.drawImage(canvas,p,p);
  const a=document.createElement('a');
  a.download='T&Mベーカリー残りパンQR_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.png';
  a.href=oc.toDataURL('image/png'); a.click();
  showToast('📥 QRコードを保存しました！',true);
}

function handleSend() {
  const selM=Object.keys(selectedMembers).filter(k=>selectedMembers[k]);
  const selB=Object.keys(selectedBreads);
  if(!selM.length||!selB.length) return;
  const btn=document.getElementById('sendBtn');
  btn.disabled=true; btn.querySelector('span').textContent='⟳ 送信中...';
  setTimeout(()=>{
    history.unshift({id:Date.now(),date:new Date().toLocaleDateString('ja-JP'),time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),breads:selB.map(id=>breads.find(b=>b.id==id)?.name).filter(Boolean),memberCount:selM.length});
    selectedBreads={}; selectedMembers={};
    renderBreadGrid(); renderMemberList(); renderHistory(); updateSteps();
    showToast('✓ '+selM.length+'人にDMを送信しました！',true);
  },1500);
}

function renderHistory() {
  const list=document.getElementById('historyList'); if(!list) return;
  if(!history.length){list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>送信履歴はありません</div></div>';return;}
  list.innerHTML=history.map(h=>'<div class="hist-card"><div class="hist-header"><span class="hist-date">'+h.date+' '+h.time+'</span><span class="hist-badge">'+h.memberCount+'人に送信</span></div><div class="hist-tags">'+h.breads.map(b=>'<span class="hist-tag">'+b+'</span>').join('')+'</div></div>').join('');
}

function renderBreadEditList() {
  const list=document.getElementById('breadEditList'); if(!list) return;
  list.innerHTML=breads.map((b,i)=>'<div style="background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;"><span style="font-size:22px;">'+b.emoji+'</span><input class="form-input" style="flex:1;padding:8px 10px;font-size:14px;" value="'+b.name+'" oninput="breads['+i+'].name=this.value"><input class="form-input" style="width:65px;padding:8px;font-size:14px;text-align:center;" type="number" value="'+b.stock+'" oninput="breads['+i+'].stock=parseInt(this.value)||0;updateStock()"><input class="form-input" style="width:78px;padding:8px;font-size:14px;text-align:center;" type="number" value="'+b.price+'" oninput="breads['+i+'].price=parseInt(this.value)||0"><button onclick="deleteBread('+b.id+')" style="background:none;border:none;cursor:pointer;color:#e8457a;font-size:20px;flex-shrink:0;">🗑</button></div>').join('');
}

function addBread() {
  const emojis=['🥨','🥯','🧁','🍩','🥞','🫔'];
  breads.push({id:nextBreadId++,name:'新しいパン',emoji:emojis[Math.floor(Math.random()*emojis.length)],stock:5,price:180});
  renderBreadEditList();
}
function deleteBread(id) { breads=breads.filter(b=>b.id!==id); delete selectedBreads[id]; renderBreadEditList(); renderBreadGrid(); updateStock(); }
function saveSettings() { updateStock(); renderBreadGrid(); showToast('💾 保存しました！',true); }

function addMember() {
  const name=document.getElementById('newMemberName').value.trim();
  const line=document.getElementById('newMemberLine').value.trim();
  if(!name){showToast('お名前を入力してください',false);return;}
  members.push({id:nextMemberId++,name,line:line||'未設定',avatar:name[0],purchases:0});
  document.getElementById('newMemberName').value='';
  document.getElementById('newMemberLine').value='';
  renderMemberFullList(); renderMemberList();
  showToast('✓ '+name+'さんを登録しました！',true);
}

function renderMemberFullList() {
  const list=document.getElementById('memberFullList'); if(!list) return;
  list.innerHTML=members.sort((a,b)=>b.purchases-a.purchases).map((m,i)=>'<div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;"><div style="width:40px;height:40px;border-radius:50%;background:'+(i===0?'var(--grad)':i===1?'#d4d4d4':i===2?'#c8935a':'var(--border)')+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:'+(i<3?'#fff':'var(--dark)')+';flex-shrink:0;">'+m.avatar+'</div><div style="flex:1;"><div style="font-weight:700;font-size:14px;">'+m.name+'</div><div style="font-size:11px;color:var(--text-sub);margin-top:2px;">'+m.line+'</div></div><div style="text-align:right;"><div style="font-size:18px;font-weight:700;color:var(--green);">'+m.purchases+'</div><div style="font-size:10px;color:var(--text-sub);">購入回数</div></div><button onclick="deleteMember('+m.id+')" style="background:none;border:none;cursor:pointer;color:var(--text-sub);font-size:18px;">✕</button></div>').join('');
}
function deleteMember(id) { members=members.filter(m=>m.id!==id); delete selectedMembers[id]; renderMemberFullList(); renderMemberList(); showToast('会員を削除しました',false); }

function showToast(msg,ok) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=ok?'var(--green)':'#c0392b';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}
