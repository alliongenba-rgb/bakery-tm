<style>
:root{
  --grad1:#ff6b35;--grad2:#ff3d7f;--grad3:#a855f7;
  --green:#1a5c2e;--green2:#2d7a40;--green-light:#4ade80;
  --cream:#fdf8f0;--text:#1a1a1a;--gray:#6b7280;--border:#e5e7eb;
  --pink:#ff3d7f;--orange:#ff6b35;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.header{background:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.header-logo{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.header-info{flex:1;}
.header-name{font-size:15px;font-weight:700;background:linear-gradient(90deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-sub{font-size:10px;color:var(--gray);}
.stock-badge{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:99;}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:3px;}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:700;}

/* SECTIONS */
.section{display:none;flex:1;}
.section.active{display:block;}

/* ===== バナー ===== */
.banner{width:100%;height:140px;position:relative;overflow:hidden;border-radius:0;}
.banner img{width:100%;height:100%;object-fit:cover;display:block;}

/* ===== DM作成 ===== */
.product-select-label{padding:10px 14px 6px;font-size:13px;font-weight:700;color:var(--text);}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);padding:0;}
.product-grid-item{background:#fff;padding:10px;cursor:pointer;position:relative;transition:background .15s;}
.product-grid-item.selected{background:#fff5f8;}
.product-grid-item .check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
.product-grid-item.selected .check{background:var(--pink);border-color:var(--pink);color:#fff;}
.product-grid-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:6px;overflow:hidden;}
.product-grid-img img{width:100%;height:100%;object-fit:cover;}
.product-grid-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.product-grid-info{display:flex;justify-content:space-between;align-items:center;}
.product-grid-stock{font-size:11px;color:var(--gray);}
.product-grid-price{font-size:13px;font-weight:700;color:var(--pink);}

.dm-bottom{padding:12px 14px;background:#fff;border-top:1px solid var(--border);}
.discount-row{display:flex;gap:6px;margin-bottom:10px;}
.disc-btn{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.disc-btn.sel{border-color:var(--pink);background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;}
.dm-msg{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px;font-size:13px;font-family:inherit;resize:none;outline:none;margin-bottom:10px;}
.dm-msg:focus{border-color:var(--pink);}
.send-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.send-btn:active{opacity:.85;}

/* ===== 商品タブ ===== */
.products-header{padding:10px 14px;font-size:13px;font-weight:700;color:var(--gray);}
.product-edit-list{padding:0 14px;display:flex;flex-direction:column;gap:10px;padding-bottom:20px;}
.product-edit-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;padding:10px;}
.product-edit-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;cursor:pointer;}
.product-edit-thumb img{width:100%;height:100%;object-fit:cover;}
.product-edit-body{flex:1;}
.product-edit-name{font-size:14px;font-weight:700;margin-bottom:6px;}
.product-edit-inputs{display:flex;gap:6px;}
.product-edit-input{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;outline:none;}
.product-edit-input:focus{border-color:var(--pink);}
.product-edit-del{background:none;border:none;color:#d1d5db;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;}
.add-product-fab{position:sticky;bottom:16px;margin:12px 14px 0;display:block;}
.add-product-btn-full{width:100%;padding:12px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}

/* ===== 会員タブ ===== */
.member-section{padding:14px;}
.qr-card{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px;}
.qr-card-title{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.qr-card-sub{font-size:12px;color:var(--gray);margin-bottom:14px;line-height:1.6;}
.qr-wrap{display:flex;justify-content:center;margin-bottom:14px;}
.qr-wrap canvas{border-radius:8px;border:1px solid var(--border);}
.line-url-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;text-align:center;}
.line-url-input:focus{border-color:#06C755;}
.qr-update-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
.qr-save-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.member-list-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.member-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.member-list-title{font-size:13px;font-weight:700;color:var(--gray);}
.member-add-btn{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:16px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.member-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:12px;}
.member-item:last-child{border-bottom:none;}
.member-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0;}
.member-body{flex:1;}
.member-name{font-size:14px;font-weight:600;}
.member-handle{font-size:11px;color:var(--gray);}
.member-purchases{text-align:right;}
.member-purchase-num{font-size:18px;font-weight:700;color:var(--text);}
.member-purchase-label{font-size:10px;color:var(--gray);}
.member-del-btn{background:none;border:none;color:#d1d5db;font-size:20px;cursor:pointer;}

/* ===== 履歴タブ ===== */
.history-section{padding:14px;}
.history-title{font-size:13px;font-weight:700;color:var(--gray);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.history-empty{text-align:center;padding:60px 20px;}
.history-empty .empty-icon{font-size:52px;margin-bottom:12px;}
.history-empty p{font-size:14px;color:var(--gray);}
.history-item{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.history-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.history-date{font-size:12px;color:var(--gray);}
.history-badge{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border-radius:10px;padding:2px 10px;font-size:12px;font-weight:700;}
.history-thumbs{display:flex;gap:4px;margin-bottom:6px;}
.history-thumb{width:52px;height:52px;border-radius:6px;object-fit:cover;background:#f3f4f6;}
.history-info{font-size:12px;color:var(--gray);}
.export-row{display:flex;gap:8px;margin-bottom:12px;}
.export-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--text);}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;}
.modal-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:var(--pink);}
.modal-photo-btn{width:100%;height:72px;border:2px dashed #d1d5db;border-radius:8px;background:#fafafa;display:flex;align-items:center;justify-content:center;cursor:pointer;gap:8px;font-size:13px;color:var(--gray);margin-bottom:12px;}
.modal-photo-prev{width:100%;height:100px;object-fit:cover;border-radius:8px;margin-bottom:12px;display:none;}
.modal-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.modal-btn-primary{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;}
.modal-btn-secondary{background:#f3f4f6;color:var(--text);}

/* 送信オーバーレイ */
.overlay-full{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.overlay-full.show{display:flex;}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
.overlay-text{color:#fff;font-size:16px;font-weight:700;}
.overlay-icon{font-size:66px;animation:pop .4s ease-out;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}

/* avatar colors */
.av0{background:linear-gradient(135deg,#ff6b35,#ff3d7f);}
.av1{background:linear-gradient(135deg,#a855f7,#ec4899);}
.av2{background:linear-gradient(135deg,#f59e0b,#ef4444);}
.av3{background:linear-gradient(135deg,#06b6d4,#3b82f6);}
.av4{background:linear-gradient(135deg,#10b981,#059669);}
</style>
</head>

    <input type="number" class="modal-input" id="pStock" placeholder="在庫数">
    <input type="number" class="modal-input" id="pPrice" placeholder="通常価格（円）">
    <div class="modal-photo-btn" onclick="document.getElementById('pPhotoIn').click()">📷 商品写真を追加</div>

<!-- 送信中 -->
<div class="overlay-full" id="sendingOv">
  <div class="spinner"></div>
  <div class="overlay-text">LINE送信中...</div>
</div>
<div class="overlay-full" id="successOv" onclick="this.classList.remove('show')">
  <div class="overlay-icon">✅</div>
  <div class="overlay-text" id="successMsg">送信完了！</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ===== STATE =====
let S = {products:[], members:[], history:[], lineUrl:'', discount:'', selectedProducts:[]};
function save(){try{localStorage.setItem('bakeryTM2',JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem('bakeryTM2');if(d)S=JSON.parse(d);}catch(e){}}
load();

// ===== TABS =====
function showTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='dm'){renderDMGrid();updateSendLabel();}
  if(t==='products')renderProductEdit();
  if(t==='member'){renderMembers();if(S.lineUrl){document.getElementById('lineUrlInput').value=S.lineUrl;generateQR(S.lineUrl);}}
  if(t==='history')renderHistory();
}

// ===== STOCK BADGE =====
function updateStockBadge(){
  const total = S.products.reduce((s,p)=>s+(parseInt(p.stock)||0),0);
  document.getElementById('stockBadge').textContent = `本日 ${total}個残り`;
}
updateStockBadge();

// ===== DM作成 =====
function renderDMGrid(){
  const g = document.getElementById('dmProductGrid');
  if(S.products.length===0){
    g.innerHTML='<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--gray);font-size:13px;background:#fff;">商品タブで商品を追加してください</div>';
    return;
  }
  g.innerHTML = S.products.map((p,i)=>{
    const sel = S.selectedProducts.includes(i);
    return `<div class="product-grid-item${sel?' selected':''}" onclick="toggleSelect(${i})">
      <div class="check">${sel?'✓':''}</div>
      <div class="product-grid-img">${p.photo?`<img src="${p.photo}">`:'🍞'}</div>
      <div class="product-grid-name">${p.name}</div>
      <div class="product-grid-info">
        <span class="product-grid-stock">残り${p.stock||0}個</span>
        <span class="product-grid-price">${p.price?'¥'+p.price:''}</span>
      </div>
    </div>`;
  }).join('');
}
function toggleSelect(i){
  const idx = S.selectedProducts.indexOf(i);
  if(idx>=0) S.selectedProducts.splice(idx,1);
  else S.selectedProducts.push(i);
  renderDMGrid();
}
function selDisc(btn,val){
  document.querySelectorAll('.disc-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  S.discount = val;
}
function updateSendLabel(){
  const n = S.members.length;
  document.getElementById('sendMemberLabel').textContent = n>0?`(${n}名)`:'';
}
function sendDM(){
  if(S.selectedProducts.length===0){alert('商品を選択してください');return;}
  if(!S.discount){alert('割引率を選択してください');return;}
  if(S.members.length===0){alert('会員タブで会員を追加してください');return;}
  if(!S.lineUrl){alert('会員タブでLINE公式URLを設定してください');return;}
  document.getElementById('sendingOv').classList.add('show');
  setTimeout(()=>{
    document.getElementById('sendingOv').classList.remove('show');
    const msg = document.getElementById('dmMsg').value;
    const selProds = S.selectedProducts.map(i=>S.products[i]);
    S.history.unshift({date:new Date().toLocaleString('ja-JP'),discount:S.discount,products:selProds,members:S.members.length,message:msg});
    S.selectedProducts=[];S.discount='';
    document.getElementById('dmMsg').value='';
    document.querySelectorAll('.disc-btn').forEach(b=>b.classList.remove('sel'));
    save();
    window.open(S.lineUrl,'_blank');
    document.getElementById('successMsg').textContent=`${S.members.length}名に送信完了！`;
    document.getElementById('successOv').classList.add('show');
    renderDMGrid();
  },1800);
}

// ===== 商品管理 =====
let pPhotoData='';
function setPPhoto(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{pPhotoData=e.target.result;const prev=document.getElementById('pPhotoPreview');prev.src=pPhotoData;prev.style.display='block';};
  r.readAsDataURL(f);
}
function openAddProduct(){
  document.getElementById('pName').value='';
  document.getElementById('pStock').value='';
  document.getElementById('pPrice').value='';
  document.getElementById('pPhotoPreview').style.display='none';
  pPhotoData='';
  document.getElementById('addProductModal').classList.add('open');
}
function saveProduct(){
  const name=document.getElementById('pName').value.trim();
  const stock=document.getElementById('pStock').value;
  const price=document.getElementById('pPrice').value;
  if(!name){alert('商品名を入力してください');return;}
  S.products.push({id:Date.now(),name,stock,price,photo:pPhotoData});
  save();renderProductEdit();updateStockBadge();closeModal('addProductModal');
}
function renderProductEdit(){
  const list=document.getElementById('productEditList');
  if(S.products.length===0){
    list.innerHTML='<div style="text-align:center;padding:30px;color:var(--gray);font-size:13px;">商品を追加してください</div>';
    return;
  }
  list.innerHTML=S.products.map((p,i)=>`
    <div class="product-edit-card">
      <div class="product-edit-thumb" onclick="changeProductPhoto(${i})">${p.photo?`<img src="${p.photo}">`:'🍞'}</div>
      <input type="file" id="pEdit_${i}" accept="image/*" style="display:none" onchange="applyProductPhoto(${i},this)">
      <div class="product-edit-body">
        <div class="product-edit-name">${p.name}</div>
        <div class="product-edit-inputs">
          <input class="product-edit-input" type="number" value="${p.stock||''}" placeholder="在庫" onchange="S.products[${i}].stock=this.value;save();updateStockBadge();">
          <input class="product-edit-input" type="number" value="${p.price||''}" placeholder="価格" onchange="S.products[${i}].price=this.value;save();">
        </div>
      </div>
      <button class="product-edit-del" onclick="deleteProduct(${i})">🗑</button>
    </div>`).join('');
}
function changeProductPhoto(i){document.getElementById('pEdit_'+i).click();}
function applyProductPhoto(i,input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{S.products[i].photo=e.target.result;save();renderProductEdit();};
  r.readAsDataURL(f);
}
function deleteProduct(i){
  S.products.splice(i,1);
  S.selectedProducts=S.selectedProducts.filter(x=>x!==i).map(x=>x>i?x-1:x);
  save();renderProductEdit();updateStockBadge();
}

// ===== 会員管理 =====
const AVCOLS=['av0','av1','av2','av3','av4'];
function openAddMember(){
  document.getElementById('mName').value='';
  document.getElementById('mHandle').value='';
  document.getElementById('addMemberModal').classList.add('open');
}
function saveMember(){
  const name=document.getElementById('mName').value.trim();
  const handle=document.getElementById('mHandle').value.trim();
  if(!name){alert('名前を入力してください');return;}
  S.members.push({id:Date.now(),name,handle,purchases:0,color:AVCOLS[S.members.length%5]});
  save();renderMembers();updateSendLabel();closeModal('addMemberModal');
}
function renderMembers(){
  const list=document.getElementById('memberList');
  if(S.members.length===0){list.innerHTML='<div style="text-align:center;padding:20px;color:var(--gray);font-size:13px;">会員がいません</div>';return;}
  list.innerHTML=S.members.map((m,i)=>`
    <div class="member-item">
      <div class="member-avatar ${m.color||'av0'}">${m.name[0]}</div>
      <div class="member-body">
        <div class="member-name">${m.name}</div>
        ${m.handle?`<div class="member-handle">@${m.handle.replace('@','')}</div>`:''}
      </div>
      <div class="member-purchases">
        <div class="member-purchase-num">${m.purchases||0}</div>
        <div class="member-purchase-label">購入回数</div>
      </div>
      <button class="member-del-btn" onclick="deleteMember(${i})">✕</button>
    </div>`).join('');
}
function deleteMember(i){S.members.splice(i,1);save();renderMembers();updateSendLabel();}

// QR
let qrObj=null;
function liveQR(){const u=document.getElementById('lineUrlInput').value.trim();if(u.length>5)generateQR(u);}
function saveLineUrl(){
  const u=document.getElementById('lineUrlInput').value.trim();
  if(!u){alert('URLを入力してください');return;}
  S.lineUrl=u;save();generateQR(u);alert('保存しました');
}
function generateQR(url){
  const canvas=document.getElementById('qrCanvas');
  canvas.getContext('2d').clearRect(0,0,180,180);
  if(qrObj){try{qrObj.clear();}catch(e){}}
  try{qrObj=new QRCode(canvas,{text:url,width:180,height:180,colorDark:'#1a5c2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}
  catch(e){console.log(e);}
}
function saveQR(){
  const canvas=document.getElementById('qrCanvas');
  const a=document.createElement('a');
  a.download='TM_LINE_QR.png';
  a.href=canvas.toDataURL();
  a.click();
}

// ===== 履歴 =====
function renderHistory(){
  const list=document.getElementById('historyList');
  if(S.history.length===0){
    list.innerHTML='<div class="history-empty"><div class="empty-icon">📭</div><p>送信履歴はありません</p></div>';
    return;
  }
  list.innerHTML=S.history.map(h=>`
    <div class="history-item">
      <div class="history-item-top">
        <span class="history-date">${h.date}</span>
        <span class="history-badge">${h.discount}%OFF</span>
      </div>
      <div class="history-thumbs">${(h.products||[]).map(p=>`<img class="history-thumb" src="${p.photo||''}" onerror="this.style.display='none'">`).join('')}</div>
      <div class="history-info">送信先: ${h.members}名${h.message?' | '+h.message:''}</div>
    </div>`).join('');
}
function exportCSV(){
  if(S.history.length===0){alert('履歴がありません');return;}
  const rows=[['日時','割引率','商品数','送信会員数','メッセージ']];
  S.history.forEach(h=>rows.push([h.date,h.discount+'%',(h.products||[]).length,h.members,h.message||'']));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='TM_送信履歴.csv';a.click();
}

// ===== MODAL =====
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});

// 初期化
if(S.lineUrl){document.getElementById('lineUrlInput').value=S.lineUrl;}
renderDMGrid();renderMembers();renderHistory();renderProductEdit();updateSendLabel();
</script>
</body>
